<!DOCTYPE html>
<html>
<head>
   
    <title>Digtize Route + Export + Clear</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <h2   style="text-align: center; background-color:rgb(184, 164, 121)"> رسم المسار بطريقة اليه مع الحفظ ملف جيسون</h2>
    <h3 style="text-align: center;background-color:rgb(224, 170, 170)">ياسر السباعى yassir900@gmail.com </h3>
    <h4 style="text-align: center;background-color:rgb(224, 170, 170)">استخدام خدمة  https://openrouteservice.org/     - esri basemap </h4>

<body>

<!-- Buttons -->
<button onclick="clearMap()" style="position:absolute;z-index:1000;top:140px;left:60px; background-color: blue; color: white;">
    Clear
</button>

<button onclick="saveGeoJSON()" style="position:absolute;z-index:1000;top:120px;left:60px; background-color: blue; color: rgb(255, 255, 255);">
    Save GeoJSON
</button>

<div id="map" style="width: 100%; height: 100vh;"></div>

<script>

// 🔑 my  API key
 //using api key from https://openrouteservice.org/   just sign up for get free key  this by Yasser Saad 2026 or contact yassir900@gmail.com to give you one if expire
const apiKey = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjIzYjJhM2QyYzBlMjRjYWJiMmJiMmRiMDZiODc5OGMwIiwiaCI6Im11cm11cjY0In0=";

var map = L.map('map').setView([24.7, 46.7], 15); // KSA location with zoom level 15

// 🛰️ Satellite basemap (Esri) map service
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri'
}).addTo(map);

var points = [];
var routeLayer = null;
var markerLayer = L.layerGroup().addTo(map);
var routeGeoJSON = null;

// 🖱️ Click to set points
map.on('click', function(e) {

    if (points.length === 2) {
        points = [];
    }

    var lat = e.latlng.lat;
    var lng = e.latlng.lng;

    points.push([lng, lat]);

    L.marker([lat, lng]).addTo(markerLayer);

    if (points.length === 2) {

        fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson", {
            method: "POST",
            headers: {
                "Authorization": apiKey,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                coordinates: points
            })
        })
        .then(res => {
            if (!res.ok) throw new Error("Routing failed: " + res.status);
            return res.json();
        })
        .then(data => {

            routeGeoJSON = data;

            if (routeLayer) {
                map.removeLayer(routeLayer);
            }

            routeLayer = L.geoJSON(data, {
                style: { color: 'yellow', weight: 5 }
            }).addTo(map);

            map.fitBounds(routeLayer.getBounds());
        })
        .catch(err => {
            console.error(err);
            alert("Route failed. Check API key or click closer points.");
        });
    }
});


// 💾 Save GeoJSON
function saveGeoJSON() {
    if (!routeGeoJSON) {
        alert("No route to save!");
        return;
    }

    var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(routeGeoJSON));
    var dl = document.createElement('a');
    dl.href = dataStr;
    dl.download = "route.geojson";
    dl.click();
}


// 🧹 CLEAR MAP (NEW)
function clearMap() {
    points = [];
    routeGeoJSON = null;

    if (routeLayer) {
        map.removeLayer(routeLayer);
        routeLayer = null;
    }

    markerLayer.clearLayers();
}

</script>

</body>
</html>
